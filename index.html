<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delícias da Tia Heliene</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#fff8f0;
}

header{
background:#b03a2e;
color:white;
padding:20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#b03a2e;
font-weight:bold;
}

.details{
max-height:0;
overflow:hidden;
transition:0.4s ease;
}

.card.active .details{
max-height:200px;
margin-top:10px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-top:8px;
width:100%;
}

footer{
background:#b03a2e;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h2>🍽️ Delícias da Tia Heliene</h2>
<p>Comida caseira com amor</p>
</header>

<div class="grid">

<div class="card" onclick="toggle(this)">
<img src="./arroz_com_galinha.png">
<div class="card-content">
<h3>Arroz com Galinha</h3>
<p class="price">R$ 15,00</p>
<div class="details">
<button onclick="pedido(event,'Arroz com Galinha')">Pedir no WhatsApp</button>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="./manicoba.png">
<div class="card-content">
<h3>Maniçoba</h3>
<p class="price">R$ 19,00</p>
<div class="details">
<button onclick="pedido(event,'Maniçoba')">Pedir no WhatsApp</button>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="./vatapa_paraense.png">
<div class="card-content">
<h3>Vatapá</h3>
<p class="price">R$ 15,00</p>
<div class="details">
<button onclick="pedido(event,'Vatapá')">Pedir no WhatsApp</button>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="./torta_salgada.png">
<div class="card-content">
<h3>Torta Salgada</h3>
<p class="price">R$ 8,00</p>
<div class="details">
<button onclick="pedido(event,'Torta Salgada')">Pedir no WhatsApp</button>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="./pudim_de_leite.png">
<div class="card-content">
<h3>Pudim</h3>
<p class="price">R$ 8,00</p>
<div class="details">
<button onclick="pedido(event,'Pudim')">Pedir no WhatsApp</button>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="./sucos_regionais.png">
<div class="card-content">
<h3>Sucos</h3>
<p class="price">R$ 4,00 / R$ 8,00</p>
<div class="details">
<button onclick="pedido(event,'Suco')">Pedir no WhatsApp</button>
</div>
</div>
</div>

</div>

<footer>
<p>📍 Tv Padre Inácio Magalhães - 977</p>
<p>📲 (91) 98875-3232 | (91) 98819-9420</p>
</footer>

<script>
function toggle(card){
card.classList.toggle("active")
}

function pedido(e,item){
e.stopPropagation()
let msg = encodeURIComponent("Olá! Quero pedir: " + item)
window.open("https://wa.me/5591988753232?text="+msg)
}
</script>

</body>
</html>
