<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delícias da Tia Heliene</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#fff8f0;
}

header{
background:#b03a2e;
color:white;
padding:20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#b03a2e;
font-weight:bold;
}

.details{
max-height:0;
overflow:hidden;
transition:0.4s ease;
}

.card.active .details{
max-height:200px;
margin-top:10px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-top:8px;
width:100%;
}

footer{
background:#b03a2e;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h2>🍽️ Delícias da Tia Heliene</h2>
<p>Comida caseira com amor</p>
</header>

<div class="grid">

<div class="card" onclick="toggle(this)">
<img src="ACG.JPG">
<div class="card-content">
<h3>Arroz com Galinha</h3>
<p class="price">R$ 15,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Arroz com Galinha" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="MC.JPG">
<div class="card-content">
<h3>Maniçoba</h3>
<p class="price">R$ 19,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Maniçoba" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="V.JPG">
<div class="card-content">
<h3>Vatapá</h3>
<p class="price">R$ 15,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Vatapá" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="TS.JPG">
<div class="card-content">
<h3>Torta Salgada</h3>
<p class="price">R$ 8,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Torta Salgada" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="M.JPG">
<div class="card-content">
<h3>Macarronada</h3>
<p class="price">R$ 8,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Macarronada" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="Pudim.JPG">
<div class="card-content">
<h3>Pudim</h3>
<p class="price">R$ 8,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Pudim" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

<div class="card" onclick="toggle(this)">
<img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663385346003/OVOISRkSipQjfQMz.png">
<div class="card-content">
<h3>Sucos</h3>
<p class="price">R$ 4,00 / R$ 8,00</p>
<div class="details">
<label><input type="checkbox" name="pedido" value="Suco" onclick="event.stopPropagation()"> Selecionar</label>
</div>
</div>
</div>

</div>

<div style="padding:20px">

<h3>Forma de pagamento</h3>
<select id="pagamento" style="width:100%;padding:10px;border-radius:8px;margin-bottom:10px">
<option value="Pix">Pix</option>
<option value="Dinheiro">Dinheiro</option>
<option value="Cartão">Cartão</option>
</select>

<button onclick="enviarPedido()" style="background:#b03a2e">
Enviar pedido pelo WhatsApp
</button>

</div>

<footer>
<p>📍 Tv Padre Inácio Magalhães - 977</p>
<p>📲 (91) 98875-3232 | (91) 98819-9420</p>
</footer>

<script>
function toggle(card){
card.classList.toggle("active")
}

function enviarPedido(){
const selecionados = document.querySelectorAll('input[name="pedido"]:checked')
const pagamento = document.getElementById("pagamento").value

let pedidos = []

selecionados.forEach(item => {
pedidos.push(item.value)
})

if(pedidos.length === 0){
alert("Selecione pelo menos um item")
return
}

const mensagem = `Boa noite, gostaria de um(a) ${pedidos.join(", ")} pagarei no ${pagamento}`
const url = `https://wa.me/5591988753232?text=${encodeURIComponent(mensagem)}`

window.open(url, "_blank")
}
</script>

</body>
</html>
